name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bin/test

  image:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Read kamal-backup version
        run: |
          VERSION=$(ruby -r ./lib/kamal_backup/version -e 'puts KamalBackup::VERSION')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if ruby -rrubygems/version -e 'exit Gem::Version.new(ARGV.fetch(0)).prerelease? ? 0 : 1' "$VERSION"; then
            echo "stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "stable=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/crmne/kamal-backup
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=${{ steps.version.outputs.version }},enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && steps.version.outputs.stable == 'true' }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

  gem:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build gem
        run: gem build kamal-backup.gemspec

      - name: Inspect gem
        run: |
          ruby -rrubygems/package -e '
            spec = Gem::Package.new(Dir["kamal-backup-*.gem"].first).spec
            puts "name=#{spec.name}"
            puts "version=#{spec.version}"
            puts "summary=#{spec.summary}"
            puts "executables=#{spec.executables.join(",")}"
          '

      - name: Check if version needs publishing
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: check_version
        run: |
          set -euo pipefail

          VERSION=$(ruby -r ./lib/kamal_backup/version -e 'puts KamalBackup::VERSION')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          GEM_NAME="kamal-backup"
          ALL_PUBLISHED_VERSIONS=$(( \
            gem list ^${GEM_NAME}$ -r --all 2>/dev/null || true; \
            gem list ^${GEM_NAME}$ -r --prerelease 2>/dev/null || true; \
          ) | sed -n 's/.*(\(.*\)).*/\1/p' \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | grep . \
            | sort -u )

          if echo "$ALL_PUBLISHED_VERSIONS" | grep -Fxq "$VERSION"; then
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Publish to RubyGems
        if: steps.check_version.outputs.version_changed == 'true'
        run: |
          mkdir -p "$HOME/.gem"
          touch "$HOME/.gem/credentials"
          chmod 0600 "$HOME/.gem/credentials"
          printf -- "---\n:rubygems_api_key: ${GEM_HOST_API_KEY}\n" > "$HOME/.gem/credentials"
          output=$(gem push "kamal-backup-${VERSION}.gem" 2>&1) || {
            echo "$output"
            if echo "$output" | grep -q "Repushing of gem versions is not allowed"; then
              echo "Version already exists on RubyGems, skipping"
              exit 0
            else
              exit 1
            fi
          }
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_AUTH_TOKEN }}
          VERSION: ${{ steps.check_version.outputs.version }}

  release:
    runs-on: ubuntu-latest
    needs: [test, image, gem]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Create GitHub release
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          set -euo pipefail

          VERSION=$(ruby -r ./lib/kamal_backup/version -e 'puts KamalBackup::VERSION')
          TAG="v$VERSION"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release $TAG already exists."
            exit 0
          fi

          prerelease_args=()
          if ruby -rrubygems/version -e "exit Gem::Version.new(ARGV.fetch(0)).prerelease? ? 0 : 1" "$VERSION"; then
            prerelease_args=(--prerelease)
          fi

          git fetch --tags --force

          previous_tag=$(git tag --sort=-v:refname --list 'v*' | head -n 1)
          if [ -n "$previous_tag" ]; then
            commit_range="${previous_tag}..${GITHUB_SHA}"
          else
            commit_range="${GITHUB_SHA}"
          fi

          commits=$(git log --reverse --format='* %H %s' ${commit_range} | grep -Ev '^\* [0-9a-f]+ (docs|test|chore):' || true)
          if [ -z "$commits" ]; then
            commits=$(git log --reverse --format='* %H %s' ${commit_range})
          fi

          {
            echo "## Changelog"
            echo "$commits"
            if [ -n "$previous_tag" ]; then
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${TAG}"
            fi
          } > release-notes.md

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --notes-file release-notes.md \
            "${prerelease_args[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - uses: actions/configure-pages@v5

      - name: Install docs dependencies
        working-directory: docs
        run: bundle install

      - name: Build docs
        working-directory: docs
        run: bundle exec jekyll build

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          path: docs/_site

  deploy-docs:
    runs-on: ubuntu-latest
    needs: docs
    if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
