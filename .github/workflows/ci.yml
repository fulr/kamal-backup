name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bin/test

  image:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Read kamal-backup version
        run: echo "version=$(ruby -r ./lib/kamal_backup/version -e 'puts KamalBackup::VERSION')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/crmne/kamal-backup
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=${{ steps.version.outputs.version }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    runs-on: ubuntu-latest
    needs: [test, image]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Create GitHub release
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          set -euo pipefail

          VERSION=$(ruby -r ./lib/kamal_backup/version -e 'puts KamalBackup::VERSION')
          TAG="v$VERSION"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release $TAG already exists."
            exit 0
          fi

          prerelease_args=()
          if ruby -rrubygems/version -e "exit Gem::Version.new(ARGV.fetch(0)).prerelease? ? 0 : 1" "$VERSION"; then
            prerelease_args=(--prerelease)
          fi

          git fetch --tags --force

          previous_tag=$(git tag --sort=-v:refname --list 'v*' | head -n 1)
          if [ -n "$previous_tag" ]; then
            commit_range="${previous_tag}..${GITHUB_SHA}"
          else
            commit_range="${GITHUB_SHA}"
          fi

          commits=$(git log --reverse --format='* %H %s' ${commit_range} | grep -Ev '^\* [0-9a-f]+ (docs|test|chore):' || true)
          if [ -z "$commits" ]; then
            commits=$(git log --reverse --format='* %H %s' ${commit_range})
          fi

          {
            echo "## Changelog"
            echo "$commits"
            if [ -n "$previous_tag" ]; then
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${TAG}"
            fi
          } > release-notes.md

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --notes-file release-notes.md \
            "${prerelease_args[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - uses: actions/configure-pages@v5

      - name: Install docs dependencies
        working-directory: docs
        run: bundle install

      - name: Build docs
        working-directory: docs
        run: bundle exec jekyll build

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          path: docs/_site

  deploy-docs:
    runs-on: ubuntu-latest
    needs: docs
    if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
