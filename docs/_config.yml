title: kamal-backup
description: Scheduled backups for Rails apps deployed with Kamal, covering databases, file-backed Active Storage, restore drills, and review evidence.
lang: en-US
timezone: Europe/Berlin

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    block:
      line_numbers: false

permalink: pretty
theme: jekyll-vitepress-theme

collections:
  guide:
    output: true
    permalink: "/:name/"
  reference:
    output: true
    permalink: "/:name/"

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      type: guide
    values:
      layout: default
  - scope:
      type: reference
    values:
      layout: default

jekyll_vitepress:
  branding:
    site_title: kamal-backup
    logo:
      default: /assets/images/logo.svg
      alt: kamal-backup
      width: 24
      height: 24
  syntax:
    light_theme: github
    dark_theme: github.dark
  tokens:
    light:
      "--vp-c-brand-1": "#0a82f5"
      "--vp-c-brand-2": "#2394ff"
      "--vp-c-brand-3": "#006ed8"
      "--vp-c-brand-soft": rgba(10, 130, 245, 0.14)
      "--vp-home-hero-name-color": transparent
      "--vp-home-hero-name-background": "-webkit-linear-gradient(120deg, #5db43e 30%, #0a82f5)"
      "--vp-home-hero-image-background-image": "linear-gradient(-45deg, #5db43e 50%, #0a82f5 50%)"
    dark:
      "--vp-c-brand-1": "#4aa3ff"
      "--vp-c-brand-2": "#78bbff"
      "--vp-c-brand-3": "#0a82f5"
      "--vp-c-brand-soft": rgba(74, 163, 255, 0.16)
      "--vp-home-hero-name-color": transparent
      "--vp-home-hero-name-background": "-webkit-linear-gradient(120deg, #77c85a 30%, #4aa3ff)"
      "--vp-home-hero-image-background-image": "linear-gradient(-45deg, #77c85a 50%, #4aa3ff 50%)"
  footer:
    enabled: true
    show_on_docs: false
    message: >-
      Brought to you by <a href="https://paolino.me" target="_blank" rel="noreferrer">Carmine Paolino</a>, maker of
    copyright: >-
      <span class="footer-brand-links"><a href="https://chatwithwork.com" class="footer-chatwithwork-link" target="_blank" rel="noreferrer"><img class="footer-chatwithwork-logo" src="https://chatwithwork.com/logotype.svg" alt="Chat with Work"></a><a href="https://rubyllm.com" class="footer-rubyllm-link" target="_blank" rel="noreferrer"><img class="footer-rubyllm-logo theme-image light" src="https://rubyllm.com/assets/images/logotype.svg" alt="RubyLLM"><img class="footer-rubyllm-logo theme-image dark" src="https://rubyllm.com/assets/images/logotype_dark.svg" alt="RubyLLM"></a></span><br><span class="footer-built-with">Docs built with <a href="https://jekyll-vitepress.dev" target="_blank" rel="noreferrer">Jekyll VitePress</a>.</span>
  doc_footer:
    enabled: true
    previous_label: Previous page
    next_label: Next page
  last_updated:
    enabled: true
    text: Last updated
    format: "%Y-%m-%d %H:%M"
  edit_link:
    enabled: true
    pattern: "https://github.com/crmne/kamal-backup/edit/master/docs/:path"
    text: Edit this page on GitHub
  github_star:
    enabled: true
    repository: crmne/kamal-backup
    text: Star
    show_count: true
  github_sponsor:
    enabled: true
    user: crmne
    text: Sponsor
  labels:
    outline: On this page
    sidebar_menu: Menu
    return_to_top: Return to top
    skip_to_content: Skip to content
    appearance_menu: Appearance
    switch_to_dark: Switch to dark theme
    switch_to_light: Switch to light theme
  behavior:
    scroll_offset: 134

plugins:
  - jekyll-vitepress-theme
  - jekyll-redirect-from

exclude:
  - _site
  - .jekyll-cache
  - .sass-cache
  - .bundle
  - vendor
  - Gemfile
  - Gemfile.lock
