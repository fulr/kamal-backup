title: kamal-backup
description: Scheduled backups for Rails apps deployed with Kamal, covering databases, file-backed Active Storage, restore drills, and review evidence.
url: https://kamal-backup.dev
lang: en-US
timezone: Europe/Berlin

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    block:
      line_numbers: false

permalink: pretty
theme: jekyll-vitepress-theme

collections:
  guide:
    output: true
    permalink: "/:name/"
  reference:
    output: true
    permalink: "/:name/"

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      type: guide
    values:
      layout: default
  - scope:
      type: reference
    values:
      layout: default

jekyll_vitepress:
  branding:
    site_title: kamal-backup
    logo:
      default: /assets/images/logo.svg
      alt: kamal-backup
      width: 24
      height: 24
  syntax:
    light_theme: github
    dark_theme: github.dark
  tokens:
    light:
      "--vp-c-brand-1": "#0a82f5"
      "--vp-c-brand-2": "#2394ff"
      "--vp-c-brand-3": "#006ed8"
      "--vp-c-brand-soft": rgba(10, 130, 245, 0.14)
      "--vp-home-hero-name-color": transparent
      "--vp-home-hero-name-background": "-webkit-linear-gradient(120deg, #5db43e 30%, #0a82f5)"
      "--vp-home-hero-image-background-image": "linear-gradient(-45deg, #5db43e 50%, #0a82f5 50%)"
    dark:
      "--vp-c-brand-1": "#4aa3ff"
      "--vp-c-brand-2": "#78bbff"
      "--vp-c-brand-3": "#0a82f5"
      "--vp-c-brand-soft": rgba(74, 163, 255, 0.16)
      "--vp-home-hero-name-color": transparent
      "--vp-home-hero-name-background": "-webkit-linear-gradient(120deg, #77c85a 30%, #4aa3ff)"
      "--vp-home-hero-image-background-image": "linear-gradient(-45deg, #77c85a 50%, #4aa3ff 50%)"
  footer:
    enabled: true
    show_on_docs: false
    message: >-
      Brought to you by <a href="https://paolino.me" target="_blank" rel="noreferrer">Carmine Paolino</a>, maker of
    copyright: >-
      <span class="footer-brand-links"><a href="https://chatwithwork.com" class="footer-chatwithwork-link" target="_blank" rel="noreferrer"><img class="footer-chatwithwork-logo" src="https://chatwithwork.com/logotype.svg" alt="Chat with Work"></a><a href="https://rubyllm.com" class="footer-rubyllm-link" target="_blank" rel="noreferrer"><img class="footer-rubyllm-logo theme-image light" src="https://rubyllm.com/assets/images/logotype.svg" alt="RubyLLM"><img class="footer-rubyllm-logo theme-image dark" src="https://rubyllm.com/assets/images/logotype_dark.svg" alt="RubyLLM"></a></span><br><span class="footer-built-with">Docs built with <a href="https://jekyll-vitepress.dev" target="_blank" rel="noreferrer">Jekyll VitePress</a>.</span>
  doc_footer:
    enabled: true
    previous_label: Previous page
    next_label: Next page
  last_updated:
    enabled: true
    text: Last updated
    format: "%Y-%m-%d %H:%M"
  edit_link:
    enabled: true
    pattern: "https://github.com/crmne/kamal-backup/edit/master/docs/:path"
    text: Edit this page on GitHub
  github_star:
    enabled: true
    repository: crmne/kamal-backup
    text: Star
    show_count: true
  github_sponsor:
    enabled: true
    user: crmne
    text: Sponsor
  labels:
    outline: On this page
    sidebar_menu: Menu
    return_to_top: Return to top
    skip_to_content: Skip to content
    appearance_menu: Appearance
    switch_to_dark: Switch to dark theme
    switch_to_light: Switch to light theme
  behavior:
    scroll_offset: 134

plugins:
  - jekyll-vitepress-theme
  - jekyll-redirect-from
  - jekyll-sitemap
  - jekyll-ai-visible-content

ai_visible_content:
  enabled: true
  entity:
    type: Organization
    id_slug: kamal-backup
    name: kamal-backup
    alternate_names:
      - Kamal Backup
      - kamal backup
    description: >-
      an open source Ruby gem and Kamal accessory for scheduled Rails database
      backups, file-backed Active Storage backups, restore drills, and security
      review evidence.
    image: /assets/images/logo.svg
    knows_about:
      - Ruby on Rails backups
      - Kamal deployment
      - restic repositories
      - Active Storage
      - PostgreSQL backups
      - MySQL backups
      - SQLite backups
      - restore drills
      - backup evidence
      - security review evidence
      - CASA security reviews
    same_as:
      - https://github.com/crmne/kamal-backup
      - https://rubygems.org/gems/kamal-backup
      - https://github.com/crmne/kamal-backup/pkgs/container/kamal-backup
  json_ld:
    auto_inject: true
    include_website_schema: false
    include_breadcrumbs: true
    include_blog_posting: true
    include_faq: true
    include_how_to: true
    article_body: full
    compact: true
  crawlers:
    allow_gptbot: true
    allow_perplexitybot: true
    allow_claudebot: true
    allow_googlebot: true
    allow_bingbot: true
    generate_robots_txt: true
  llms_txt:
    enabled: true
    title: kamal-backup Documentation
    description: >-
      Documentation for kamal-backup, an open source Ruby gem and Kamal accessory
      that schedules encrypted Rails database and file-backed Active Storage
      backups, restores data locally or into production targets, runs restore
      drills, and emits redacted evidence for security reviews.
    include_full_text: true
    sections:
      - heading: Primary use case
        content: >-
          Use kamal-backup when a Rails application is deployed with Kamal and
          needs scheduled database backups, file-backed Active Storage backups,
          restore drills, restic checks, and security review evidence from one
          accessory.
      - heading: Best starting points
        content: >-
          Start with /getting-started/ for installation, /how-backups-work/ for
          architecture, /configuration/ for YAML and Kamal accessory settings,
          /restore-drills/ for verification workflows, /evidence/ for security
          review output, and /commands/ for the complete command reference.
      - heading: Documentation map
        content: |-
          - [Getting Started](https://kamal-backup.dev/getting-started/): install the gem, generate config, add the Kamal accessory, and run the first backup.
          - [How Backups Work](https://kamal-backup.dev/how-backups-work/): understand restic snapshots, backup paths, checks, restore drills, and evidence.
          - [Configuration](https://kamal-backup.dev/configuration/): configure YAML, secrets, local restore overrides, retention, and restic options.
          - [Restore](https://kamal-backup.dev/restore/): restore database and Active Storage backups locally or into production.
          - [Restore Drills](https://kamal-backup.dev/restore-drills/): practice and record restore verification workflows.
          - [Evidence for Security Reviews](https://kamal-backup.dev/evidence/): produce redacted JSON for CASA-style security reviews.
          - [Commands](https://kamal-backup.dev/commands/): reference every kamal-backup command and option shape.
          - [Security and Restore Safety](https://kamal-backup.dev/security/): review secret redaction, subprocess handling, backup formats, and deliberate restore behavior.
  linking:
    enable_entity_links: false
    apply_to_metadata: false
    max_links_per_entity_per_post: 1
    enable_related_posts: false
    entity_definitions:
      ruby-on-rails:
        name: Ruby on Rails
        url: https://rubyonrails.org/
        description: The web framework used by applications that kamal-backup protects.
      kamal:
        name: Kamal
        url: https://kamal-deploy.org/
        description: The deployment tool whose accessory model runs kamal-backup in production.
      restic:
        name: restic
        url: https://restic.net/
        description: The encrypted backup repository and snapshot engine used by kamal-backup.
      active-storage:
        name: Active Storage
        url: https://guides.rubyonrails.org/active_storage_overview.html
        description: The Rails file attachment system whose file-backed storage can be backed up.
      postgresql:
        name: PostgreSQL
        url: https://www.postgresql.org/
        description: A database adapter supported by kamal-backup.
      mysql:
        name: MySQL
        url: https://www.mysql.com/
        description: A database adapter supported by kamal-backup.
      sqlite:
        name: SQLite
        url: https://www.sqlite.org/
        description: A database adapter supported by kamal-backup.
  validation:
    warn_name_inconsistency: true
    warn_missing_same_as: true
    warn_missing_dates: true
    warn_orphan_pages: true
    warn_missing_descriptions: true
    fail_build_on_error: false
    content_only: true
    exclude_paths: []
    verbose: false
    max_examples: 5
  ai_resources:
    enabled: true
    formats:
      - json
      - yaml
    max_links_per_page: 5
    auto_inject: true
    inject_instruction_block: true
    base_path: /ai

exclude:
  - _site
  - .jekyll-cache
  - .sass-cache
  - .bundle
  - vendor
  - Gemfile
  - Gemfile.lock
